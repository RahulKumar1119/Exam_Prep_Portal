version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm ci
            # Install Chromium for react-snap pre-rendering
            - yum install -y chromium || echo "Chromium already available"
        build:
          commands:
            - echo "Building React application with pre-rendering..."
            - npm run build
            - echo "Build completed successfully"
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: '**'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=0, no-cache, no-store, must-revalidate'
        - pattern: '**/*.js'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.css'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.png'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.jpg'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.svg'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.woff'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
        - pattern: '**/*.woff2'
          headers:
            - key: 'Cache-Control'
              value: 'max-age=31536000, immutable'
      rewrites:
        - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|svg|woff|woff2|ttf|eot|otf|html)$)([^.]+$)/'
          target: '/index.html'
          status: '200'
